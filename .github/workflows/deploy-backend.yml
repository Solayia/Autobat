name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma Client
        working-directory: backend
        run: npx prisma generate

      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "backend/src,backend/prisma,backend/package.json,backend/package-lock.json,backend/ecosystem.config.cjs"
          target: "/var/www/autobat/"
          strip_components: 0

      - name: Install, migrate & restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: STRIPE_WEBHOOK_SECRET
          script: |
            # Installer les dépendances système pour Chrome (Ubuntu 24.04 - libasound2t64 requis)
            apt-get update -qq || true
            apt-get install -y -q \
              libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 \
              libcups2 libdrm2 libxkbcommon0 libxcomposite1 \
              libxdamage1 libxrandr2 libgbm1 libxss1 libxtst6 \
              libasound2t64 libx11-xcb1 libxcb-dri3-0 libxfixes3 \
              libpangocairo-1.0-0 fonts-liberation xdg-utils || true
            cd /var/www/autobat/backend
            npm ci --production
            # Télécharger le Chrome bundlé Puppeteer si pas encore présent
            npx puppeteer browsers install chrome || true
            npx prisma generate
            npx prisma db push
            node prisma/create-super-admin.js
            node prisma/seed-catalogue-all-tenants.js
            sed -i "s|STRIPE_WEBHOOK_SECRET=.*|STRIPE_WEBHOOK_SECRET=$STRIPE_WEBHOOK_SECRET|" /var/www/autobat/backend/.env
            pm2 reload ecosystem.config.cjs --env production
            pm2 save
        env:
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
