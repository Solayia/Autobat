name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma Client
        working-directory: backend
        run: npx prisma generate

      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "backend/src,backend/prisma,backend/package.json,backend/package-lock.json,backend/ecosystem.config.cjs"
          target: "/var/www/autobat/"
          strip_components: 0

      - name: Install, migrate & restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: STRIPE_WEBHOOK_SECRET,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET
          script: |
            # Installer les dépendances système pour Chrome (Ubuntu 24.04 - libasound2t64 requis)
            apt-get update -qq || true
            apt-get install -y -q \
              libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 \
              libcups2 libdrm2 libxkbcommon0 libxcomposite1 \
              libxdamage1 libxrandr2 libgbm1 libxss1 libxtst6 \
              libasound2t64 libx11-xcb1 libxcb-dri3-0 libxfixes3 \
              libpangocairo-1.0-0 fonts-liberation xdg-utils || true
            # Créer le dossier uploads dans backend
            mkdir -p /var/www/autobat/backend/uploads/logos
            # Nginx: proxy /uploads vers backend (plus fiable que alias statique)
            if [ -f /etc/nginx/sites-available/autobat ]; then
              if grep -q "location /uploads" /etc/nginx/sites-available/autobat; then
                perl -i -0pe 's|location /uploads \{[^}]*\}|location /uploads {\n        proxy_pass http://localhost:3000;\n        proxy_set_header Host \$host;\n    }|s' /etc/nginx/sites-available/autobat
              else
                sed -i 's|# Backend API|location /uploads {\n        proxy_pass http://localhost:3000;\n        proxy_set_header Host $host;\n    }\n\n    # Backend API|' /etc/nginx/sites-available/autobat
              fi
              nginx -t && nginx -s reload || true
            fi
            cd /var/www/autobat/backend
            npm ci --production
            # Télécharger le Chrome bundlé Puppeteer si pas encore présent
            npx puppeteer browsers install chrome || true
            npx prisma generate
            npx prisma db push
            node prisma/create-super-admin.js
            node prisma/seed-catalogue-all-tenants.js
            sed -i "s|STRIPE_WEBHOOK_SECRET=.*|STRIPE_WEBHOOK_SECRET=$STRIPE_WEBHOOK_SECRET|" /var/www/autobat/backend/.env
            # Google OAuth2 credentials
            if grep -q "GOOGLE_CLIENT_ID=" /var/www/autobat/backend/.env; then
              sed -i "s|GOOGLE_CLIENT_ID=.*|GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID|" /var/www/autobat/backend/.env
            else
              echo "GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID" >> /var/www/autobat/backend/.env
            fi
            if grep -q "GOOGLE_CLIENT_SECRET=" /var/www/autobat/backend/.env; then
              sed -i "s|GOOGLE_CLIENT_SECRET=.*|GOOGLE_CLIENT_SECRET=$GOOGLE_CLIENT_SECRET|" /var/www/autobat/backend/.env
            else
              echo "GOOGLE_CLIENT_SECRET=$GOOGLE_CLIENT_SECRET" >> /var/www/autobat/backend/.env
            fi
            if grep -q "APP_URL=" /var/www/autobat/backend/.env; then
              sed -i "s|APP_URL=.*|APP_URL=https://autobat.pro|" /var/www/autobat/backend/.env
            else
              echo "APP_URL=https://autobat.pro" >> /var/www/autobat/backend/.env
            fi
            # Supprimer UPLOADS_PATH si présent (backend utilise son propre dossier uploads/)
            sed -i '/^UPLOADS_PATH=/d' /var/www/autobat/backend/.env || true
            pm2 reload ecosystem.config.cjs --env production
            pm2 save
        env:
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
